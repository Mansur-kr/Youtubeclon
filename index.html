<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtube</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div id="app">
     
      <nav class="flex justify-between items-center px-4 py-2 sticky top-0 bg-[#0f0f0f] z-50 h-[56px]">
        <div class="flex items-center gap-4">
            <button id="menuBtn" class="hover:bg-zinc-800 p-2 rounded-full transition text-xl">☰</button>
            <div class="flex items-center gap-1 cursor-pointer" onclick="location.reload()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="h-5" alt="YouTube">
            </div>
        </div>

        <div class="flex flex-1 max-w-[720px] px-10">
            <div class="flex w-full group">
                <input id="searchInput" type="text" placeholder="Введите запрос" 
                    class="w-full bg-[#121212] border border-zinc-700 rounded-l-full py-2 px-4 focus:border-blue-500 outline-none">
                <button class="bg-zinc-800 border border-l-0 border-zinc-700 px-5 rounded-r-full hover:bg-zinc-700">🔍</button>
            </div>
            <button class="bg-zinc-800 p-2 rounded-full ml-4 hover:bg-zinc-700">🎤</button>
        </div>

        <div class="flex gap-3 items-center">
            <button class="hidden sm:block hover:bg-zinc-800 p-2 rounded-full text-xl text-zinc-400">📤</button>
            <button class="hover:bg-zinc-800 p-2 rounded-full text-xl text-zinc-400"><img src="" alt=""></button>
            <div class="w-8 h-8 bg-orange-600 rounded-full flex items-center justify-center text-sm ml-2 cursor-pointer font-bold">A</div>
        </div>
    </nav>

    <div class="flex">
        <aside id="sidebar" class="w-64 fixed left-0 top-[56px] h-[calc(100vh-56px)] overflow-y-auto transition-all duration-300 z-40 px-3 bg-[#0f0f0f]">
            
            <div onclick="location.reload()" class="menu-item flex items-center gap-5 p-3 hover:bg-zinc-800 rounded-xl cursor-pointer bg-zinc-800 transition-all">
    <span class="text-xl">🏠</span>
    <span class="menu-text font-medium text-[14px] whitespace-nowrap">Главная</span>
</div>

            

<div onclick="window.renderShorts()" class="menu-item flex items-center gap-5 p-3 hover:bg-zinc-800 rounded-xl cursor-pointer mt-1 transition-all">
    <span class="text-xl">🩳</span>
    <span class="menu-text font-medium text-[14px] whitespace-nowrap">Shorts</span>
</div>

            <div class="menu-item flex items-center gap-5 p-3 hover:bg-zinc-800 rounded-xl cursor-pointer mt-1 transition-all">
                <span class="text-xl">🎞️</span>
                <span class="menu-text font-medium text-[14px] whitespace-nowrap">Подписки</span>
            </div>
             
            <hr class="border-zinc-700 my-3">
            
            <h3 class="menu-text px-3 mb-2 font-bold text-zinc-400 text-sm">Подписки</h3>
            <div class="menu-item flex items-center gap-5 p-3 hover:bg-zinc-800 rounded-xl cursor-pointer transition-all">
                <div class="w-6 h-6 rounded-full bg-blue-500"></div>
                <span class="menu-text font-medium text-[14px] whitespace-nowrap">aidevix</span>
            </div>
        </aside>

        <main id="mainContent" class="ml-64 flex-1 transition-all duration-300 p-4 lg:px-8">
            <div id="categoryContainer" class="flex gap-3 py-3 sticky top-[56px] bg-[#0f0f0f] z-40 overflow-x-auto">
                </div>

            <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-4 gap-y-10 mt-4">
                </div>
        </main>
    </div>

    <div id="playerModal" class="fixed inset-0 bg-black/95 z-[100] hidden flex-col items-center justify-center p-4">
        <button id="closePlayer" class="absolute top-5 right-5 text-4xl hover:text-red-500">×</button>
        <div class="w-full max-w-[1000px] aspect-video">
            <iframe id="videoIframe" class="w-full h-full rounded-xl" src="" frameborder="0" allowfullscreen></iframe>
        </div>
        <h2 id="playerTitle" class="mt-6 text-2xl font-bold"></h2>
    </div>
    

    


    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
